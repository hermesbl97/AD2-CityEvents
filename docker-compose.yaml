name: cityEvents2
services:
  cityEvents2-db:
    image: mariadb:11.3.2
    container_name: cityEvents2-db
    environment:
      MARIADB_DATABASE: $MYSQL_DATABASE
      MARIADB_USER: $MYSQL_USER
      MARIADB_PASSWORD: $CITY_EVENTS2_DB_PASSWORD
      MARIADB_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
    ports:
      - "3307:3306"
    healthcheck:
      test: [ CMD, healthcheck.sh, --connect, --innodb_initialized ]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - network-cityEvents2

  cityEvents2-api:
    image: city-events2-api
    container_name: city-events2-api
    ports:
      - "8089:8089"
    depends_on:
      cityEvents2-db:
        condition: service_healthy
    environment:
      CITY_EVENTS2_DB_PASSWORD: $CITY_EVENTS2_DB_PASSWORD
      SPRING_PROFILES_ACTIVE: $PROFILE
    networks:
      - network-cityEvents2
networks:
  network-cityEvents2:
    driver: bridge
